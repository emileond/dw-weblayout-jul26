<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lato:wght@400;700&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
          rel="stylesheet">
</head>
<body>
<div class="flex min-h-[100vh]">
    <nav class="hidden lg:flex flex-col gap-3 w-90 border-r-1 border-gray-300">
        <img class="w-40 px-8 pt-8"
             src="./img/logo.png"/>
        <div class="flex flex-col grow justify-between p-6">
            <div class="flex flex-col items-start gap-3">
                <button class="flex w-full gap-2 items-center py-2 px-4 cursor-pointer hover:bg-gray-100 rounded-md">
                    <i class="ri-home-line text-2xl"></i>
                    Inicio
                </button>
                <button class="flex w-full gap-2 items-center py-2 px-4 cursor-pointer hover:bg-gray-100 rounded-md">
                    <i class="ri-group-line text-2xl"></i>
                    Clientes
                </button>
                <button class="flex w-full gap-2 items-center py-2 px-4 cursor-pointer hover:bg-gray-100 rounded-md">
                    <i class="ri-briefcase-line text-2xl"></i>
                    Proyectos
                </button>
                <button class="flex w-full gap-2 items-center py-2 px-4 cursor-pointer hover:bg-gray-100 rounded-md">
                    <i class="ri-receipt-line text-2xl"></i>
                    Facturas
                </button>
                <button class="flex w-full gap-2 items-center py-2 px-4 cursor-pointer hover:bg-gray-100 rounded-md">
                    <i class="ri-archive-line text-2xl"></i>
                    Productos
                </button>
                <button class="flex w-full gap-2 items-center py-2 px-4 cursor-pointer bg-blue-500 text-white hover:bg-blue-600 rounded-md">
                    <i class="ri-mail-line text-2xl"></i>
                    Mensajes
                </button>
            </div>
            <button class="flex gap-2 text-red-500 items-center hover:bg-red-50 py-2 px-4 cursor-pointer rounded-md">
                <i class="ri-logout-box-line text-xl"></i>
                Cerrar Sesión
            </button>
        </div>
    </nav>
    <div class="grow">
        <div class="flex justify-between grow p-3 border-b-1 border-gray-200">
            <div class="flex items-center gap-3 px-3 py-2 bg-gray-200 rounded-lg">
                <i class="ri-search-line"></i>
                <input class="w-50 focus:w-80 transition-all duration-250 focus:outline-none"
                       placeholder="Buscar"
                       type="text"/>
            </div>
            <div class="flex gap-3 items-center">
                <div class="flex gap-3">
                    <i class="ri-settings-3-line text-2xl"></i>
                    <i class="ri-notification-3-line text-2xl"></i>
                </div>
                <div class="border-1 py-3 border-gray-200">
                </div>
                <img class="w-12 h-12 rounded-full object-cover"
                     src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=928&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"/>
            </div>
        </div>
        <div class="flex grow ">
            <div class="flex flex-col gap-3 basis-90 p-6 border-r-1 border-gray-200 min-h-[90vh]">
                <div class="flex justify-between">
                    <h1 class="text-2xl font-semibold">Mensajes</h1>
                    <button class="flex gap-2 border-1 rounded-md border-gray-200 py-1 px-3 hover:bg-gray-100">
                        <i class="ri-add-fill"></i>
                        Nuevo
                    </button>
                </div>
                <div class="flex items-center gap-3 px-3 py-2 bg-gray-200 rounded-lg">
                    <i class="ri-search-line"></i>
                    <input class="w-full focus:outline-none" placeholder="Buscar mensajes" type="text"/>
                </div>
                <div>
                    <div class="flex justify-between gap-3 p-3 border-b-1 border-gray-200 hover:bg-gray-100 cursor-pointer rounded">
                        <div class="flex gap-3">
                            <img class="w-12 h-12 rounded-full object-cover"
                                 src="https://plus.unsplash.com/premium_photo-1670884441012-c5cf195c062a?q=80&w=774&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"/>
                            <div class="flex flex-col">
                                <span class="font-medium">María López</span>
                                <span class="text-sm text-gray-700">Quisiera saber mas sobre</span>
                            </div>
                        </div>
                        <div>
                            <span class="text-sm text-gray-500">4m</span>
                            <div class="flex justify-center items-center w-6 h-6 text-sm rounded-full bg-blue-500 text-white">
                                3
                            </div>
                        </div>
                    </div>
                    <div class="flex justify-between gap-3 p-3 border-b-1 border-gray-200 hover:bg-gray-100 cursor-pointer rounded">
                        <div class="flex gap-3">
                            <img class="w-12 h-12 rounded-full object-cover"
                                 src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?q=80&w=774&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"/>
                            <div class="flex flex-col">
                                <span class="font-medium">Albert Flores</span>
                                <span class="text-sm text-gray-700">Quisiera saber mas sobre</span>
                            </div>
                        </div>
                        <div>
                            <span class="text-sm text-gray-500">4m</span>
                            <div class="flex justify-center items-center w-6 h-6 text-sm rounded-full bg-blue-500 text-white">
                                3
                            </div>
                        </div>
                    </div>
                    <div class="flex justify-between gap-3 p-3 border-b-1 border-gray-200 bg-blue-50 hover:bg-blue-100 cursor-pointer rounded">
                        <div class="flex gap-3">
                            <img class="w-12 h-12 rounded-full object-cover"
                                 src="https://plus.unsplash.com/premium_photo-1689977807477-a579eda91fa2?q=80&w=1740&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"/>
                            <div class="flex flex-col">
                                <span class="font-medium">Jorge Ramírez</span>
                                <span class="text-sm text-gray-700">Quisiera saber mas sobre</span>
                            </div>
                        </div>
                        <div>
                            <span class="text-sm text-gray-500">4m</span>
                            <div class="flex justify-center items-center w-6 h-6 text-sm rounded-full bg-blue-500 text-white">
                                3
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="grow bg-gray-50">
                <div class="flex justify-between items-center bg-white p-3">
                    <div class="flex gap-3 relative">
                        <div class="w-4 h-4 bg-green-500 rounded-full absolute left-9 border-2 border-white">

                        </div>
                        <img class="w-12 h-12 object-cover rounded-full"
                             src="https://plus.unsplash.com/premium_photo-1689977807477-a579eda91fa2?q=80&w=1740&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"/>
                        <div class="flex flex-col">
                            <span class="font-semibold">Jorge Ramírez</span>
                            <span class="text-sm text-gray-500">En línea</span>
                        </div>
                    </div>
                    <div class="flex gap-3 text-2xl">
                        <button class="hover:bg-gray-100 rounded-full p-1 px-2 cursor-pointer">
                            <i class="ri-more-fill"></i>
                        </button>
                        <button class="hover:bg-gray-100 rounded-full p-1 px-2 cursor-pointer">
                            <i class="ri-phone-line"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
