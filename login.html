<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Appy - Login</title>
    <link rel="stylesheet" href="main.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lato:wght@400;700&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
          rel="stylesheet">
</head>
<body>
<span class="logo">
        Appy
</span>
<div class="login-wrapper">
    <main class="login-main">
        <div class="login-flex">
            <h1>
                Iniciar Sesión
            </h1>
            <div class="login-social-btns">
                <button>
                    <i class="ri-google-fill"></i>
                </button>
                <button>
                    <i class="ri-apple-fill"></i>
                </button>
            </div>
            <span>Inicia con tu correo</span>
            <form>
                <div class="input-wrapper">
                    <i class="ri-mail-line"></i>
                    <label for="email">
                        Email
                    </label>
                    <input id="email" type="email" placeholder="Email"/>
                </div>
                <div class="input-wrapper">
                    <i class="ri-lock-line"></i>
                    <label for="password">
                        Contraseña
                    </label>
                    <input id="password" type="password" placeholder="Contraseña"/>
                    <i class="ri-eye-close-line"></i>
                </div>
                <a>
                    Olvidaste tu contraseña?
                </a>
            </form>
            <button class="btn-primary">
                Iniciar sesión
            </button>
            <a>
                Aun no tienes cuenta? Regístrate
            </a>
        </div>
    </main>
    <div class="login-bg">
        
    </div>
</div>
</body>
</html>
